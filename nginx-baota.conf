server {
    listen 80;
    listen 443 ssl http2;
    server_name music.yourdomain.com;

    # SSL 配置（宝塔会自动管理，保留以下作为占位）
    # ssl_certificate /www/server/panel/vhost/cert/music.yourdomain.com/fullchain.pem;
    # ssl_certificate_key /www/server/panel/vhost/cert/music.yourdomain.com/privkey.pem;
    # ssl_protocols TLSv1.2 TLSv1.3;
    # ssl_ciphers ECDHE-RSA-AES128-GCM-SHA256:ECDHE-RSA-AES256-GCM-SHA384;
    # ssl_prefer_server_ciphers on;

    # 强制 HTTPS（申请 SSL 后开启）
    # if ($server_port !~ 443) {
    #     rewrite ^(/.*)$ https://$host$1 permanent;
    # }

    # 根目录（前端静态文件）
    root /www/wwwroot/music.yourdomain.com/public;
    index index.html index.htm;

    # 静态资源缓存
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot|mp3|mp4|ogg|webm)$ {
        expires 30d;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # 前端路由：单页应用，所有路径回退到 index.html
    location / {
        try_files $uri $uri/ /index.html;
    }

    # API 反向代理到 Node.js（关键配置）
    location /api/ {
        proxy_pass http://127.0.0.1:3000/api/;
        proxy_http_version 1.1;

        # WebSocket 支持（可选，用于未来扩展）
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";

        # 传递真实客户端信息
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # 超时设置（扫码登录可能需要较长时间）
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;

        # 缓冲区设置
        proxy_buffering off;
        proxy_request_buffering off;
    }

    # 安全头（可选）
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;

    # 日志
    access_log /www/wwwlogs/music.yourdomain.com.log;
    error_log /www/wwwlogs/music.yourdomain.com.error.log;
}
