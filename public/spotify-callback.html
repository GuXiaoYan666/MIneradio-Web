<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Spotify 授权回调</title>
<style>
  body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background: #0a0a0a; color: #fff; display: flex; align-items: center; justify-content: center; height: 100vh; margin: 0; text-align: center; }
  .box { padding: 24px; }
  h1 { font-size: 18px; margin-bottom: 8px; }
  p { color: #aaa; font-size: 14px; }
  .ok { color: #1db954; }
  .err { color: #ff4444; }
</style>
</head>
<body>
<div class="box" id="box">
  <h1>正在处理 Spotify 授权…</h1>
  <p>请稍候</p>
</div>
<script>
(function() {
  var params = new URLSearchParams(location.search);
  var code = params.get('code');
  var error = params.get('error');
  var box = document.getElementById('box');

  if (error) {
    box.innerHTML = '<h1 class="err">授权失败</h1><p>' + error + '</p>';
    if (window.opener) {
      try { window.opener.postMessage({ type: 'spotify-oauth-error', error: error }, '*'); } catch(e) {}
      setTimeout(function() { window.close(); }, 800);
    }
    return;
  }

  if (!code) {
    box.innerHTML = '<h1 class="err">缺少授权码</h1><p>无法完成授权</p>';
    return;
  }

  // 通知父窗口或重定向回应用
  if (window.opener) {
    // 弹窗模式：通知父窗口
    try { window.opener.postMessage({ type: 'spotify-oauth-code', code: code }, '*'); } catch(e) {}
    box.innerHTML = '<h1 class="ok">授权成功</h1><p>正在关闭窗口…</p>';
    setTimeout(function() { window.close(); }, 600);
  } else {
    // 重定向模式：将code发给后端，然后跳转回首页
    box.innerHTML = '<h1>正在验证授权…</h1><p>请稍候</p>';
    fetch('/api/spotify/oauth/callback?code=' + encodeURIComponent(code))
      .then(function(r) { return r.json(); })
      .then(function(data) {
        if (data.loggedIn) {
          box.innerHTML = '<h1 class="ok">登录成功</h1><p>即将返回播放器</p>';
          // 保存成功标记到 sessionStorage，首页会读取
          sessionStorage.setItem('mineradio_spotify_login', JSON.stringify({ ok: true, at: Date.now() }));
        } else {
          box.innerHTML = '<h1 class="err">登录失败</h1><p>' + (data.error || '未知错误') + '</p>';
          sessionStorage.setItem('mineradio_spotify_login', JSON.stringify({ ok: false, error: data.error, at: Date.now() }));
        }
        setTimeout(function() { location.href = '/'; }, 800);
      })
      .catch(function(e) {
        box.innerHTML = '<h1 class="err">验证失败</h1><p>' + e.message + '</p>';
        setTimeout(function() { location.href = '/'; }, 1200);
      });
  }
})();
</script>
</body>
</html>
